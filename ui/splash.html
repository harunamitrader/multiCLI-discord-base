<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starting Codex Discord Connected Display</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Meiryo UI", Meiryo, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(160, 180, 225, 0.95), rgba(147, 169, 218, 0.92)),
          #a0b4e1;
        color: #17304f;
      }

      .splash-card {
        width: min(360px, calc(100vw - 32px));
        padding: 28px 24px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 18px 45px rgba(25, 40, 69, 0.18);
        text-align: center;
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 10px;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #60718d;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 10px 0 0;
        font-size: 12px;
        line-height: 1.7;
        color: #5d6f8b;
      }

      .spinner {
        width: 42px;
        height: 42px;
        margin: 0 auto 18px;
        border-radius: 50%;
        border: 4px solid rgba(61, 152, 59, 0.18);
        border-top-color: #3d983b;
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main class="splash-card">
      <div class="spinner" aria-hidden="true"></div>
      <span class="eyebrow">Codex Discord Connected Display</span>
      <h1>Launching CoDiCoDi</h1>
      <p>Preparing the local bridge and loading your workspace.</p>
    </main>
  </body>
  </html>
